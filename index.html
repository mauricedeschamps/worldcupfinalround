<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>World Cup Knockout Simulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        /* ----- Reset & Base ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body.light {
            background: #f0f0f0;
            color: #222;
        }

        /* ----- Header & Footer ----- */
        header,
        footer {
            padding: 1rem;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        body.light header,
        body.light footer {
            background: #ddd;
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #eee;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            white-space: nowrap;
        }
        body.light .header-actions button {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
            color: #222;
        }
        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        body.light .header-actions button:hover {
            background: rgba(0, 0, 0, 0.15);
        }
        #reset-button {
            border-color: #ff6b6b !important;
            color: #ff6b6b !important;
        }
        body.light #reset-button {
            border-color: #d63031 !important;
            color: #d63031 !important;
        }
        #reset-button:hover {
            background: rgba(255, 107, 107, 0.2) !important;
        }

        footer {
            margin-top: auto;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
        }
        footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        body.light footer a {
            color: #0277bd;
        }
        footer a:hover {
            text-decoration: underline;
        }

        /* ----- Tournament ----- */
        #tournament {
            display: flex;
            overflow-x: auto;
            padding: 1rem;
            gap: 1rem;
            flex: 1;
            align-items: flex-start;
        }
        .round {
            flex: 0 0 210px;
            min-width: 210px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 0.6rem 0.4rem;
        }
        body.light .round {
            background: rgba(0, 0, 0, 0.04);
        }
        .round h2 {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 0 0 0.6rem 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .match {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 0.5rem 0.4rem;
            margin-bottom: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            transition: background 0.2s;
        }
        body.light .match {
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .team {
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            cursor: default;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            transition: background 0.15s;
        }
        .team:not(.winner):not(.loser):hover {
            background: rgba(255, 255, 255, 0.15);
        }
        body.light .team:not(.winner):not(.loser):hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .team.winner {
            background: #ffd700;
            color: #000;
            font-weight: 700;
            border-radius: 4px;
            padding: 0.2rem 0.4rem;
        }
        .team.loser {
            opacity: 0.4;
            text-decoration: line-through;
        }
        .team.tbd {
            opacity: 0.5;
            font-style: italic;
        }
        .match-info {
            font-size: 0.55rem;
            text-align: center;
            opacity: 0.6;
            margin-top: 0.15rem;
            letter-spacing: 0.2px;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.1rem; }
            .round { flex: 0 0 170px; min-width: 170px; }
            .team { font-size: 0.7rem; }
            .match-info { font-size: 0.5rem; }
            .header-actions button { font-size: 0.75rem; padding: 0.3rem 0.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ World Cup 2026</h1>
        <div class="header-actions">
            <button id="reset-button">🔄 Reset Bracket</button>
            <button id="theme-toggle">Light Mode</button>
        </div>
    </header>

    <main id="tournament"></main>

    <footer>
        <p>Contact us<br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
    </footer>

    <script>
        // ================================================================
        // 1. TEAM DATA (with flags)
        // ================================================================
        const TEAMS = [
            { name: 'South Africa', flag: '🇿🇦' },
            { name: 'Canada', flag: '🇨🇦' },
            { name: 'Germany', flag: '🇩🇪' },
            { name: 'Paraguay', flag: '🇵🇾' },
            { name: 'Netherlands', flag: '🇳🇱' },
            { name: 'Morocco', flag: '🇲🇦' },
            { name: 'Brazil', flag: '🇧🇷' },
            { name: 'Japan', flag: '🇯🇵' },
            { name: 'France', flag: '🇫🇷' },
            { name: 'Sweden', flag: '🇸🇪' },
            { name: 'Ivory Coast', flag: '🇨🇮' },
            { name: 'Norway', flag: '🇳🇴' },
            { name: 'Mexico', flag: '🇲🇽' },
            { name: 'Ecuador', flag: '🇪🇨' },
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
            { name: 'DR Congo', flag: '🇨🇩' },
            { name: 'USA', flag: '🇺🇸' },
            { name: 'Bosnia and Herzegovina', flag: '🇧🇦' },
            { name: 'Belgium', flag: '🇧🇪' },
            { name: 'Senegal', flag: '🇸🇳' },
            { name: 'Portugal', flag: '🇵🇹' },
            { name: 'Croatia', flag: '🇭🇷' },
            { name: 'Spain', flag: '🇪🇸' },
            { name: 'Austria', flag: '🇦🇹' },
            { name: 'Switzerland', flag: '🇨🇭' },
            { name: 'Algeria', flag: '🇩🇿' },
            { name: 'Argentina', flag: '🇦🇷' },
            { name: 'Cape Verde', flag: '🇨🇻' },
            { name: 'Colombia', flag: '🇨🇴' },
            { name: 'Ghana', flag: '🇬🇭' },
            { name: 'Australia', flag: '🇦🇺' },
            { name: 'Egypt', flag: '🇪🇬' }
        ];

        function getTeam(name) {
            return TEAMS.find(t => t.name === name);
        }

        // ================================================================
        // 2. ROUND OF 32 – 16 matches (Match 73–88)
        // ================================================================
        const R32_DATA = [
            { home: 'South Africa', away: 'Canada', date: 'Jun 28, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { home: 'Germany', away: 'Paraguay', date: 'Jun 29, 4:30 PM', stadium: 'Gillette Stadium, Foxborough' },
            { home: 'Netherlands', away: 'Morocco', date: 'Jun 29, 9:00 PM', stadium: 'Estadio BBVA, Guadalupe' },
            { home: 'Brazil', away: 'Japan', date: 'Jun 29, 1:00 PM', stadium: 'NRG Stadium, Houston' },
            { home: 'France', away: 'Sweden', date: 'Jun 30, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { home: 'Ivory Coast', away: 'Norway', date: 'Jun 30, 1:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { home: 'Mexico', away: 'Ecuador', date: 'Jun 30, 9:00 PM', stadium: 'Estadio Azteca, Mexico City' },
            { home: 'England', away: 'DR Congo', date: 'Jul 1, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { home: 'USA', away: 'Bosnia and Herzegovina', date: 'Jul 1, 8:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { home: 'Belgium', away: 'Senegal', date: 'Jul 1, 4:00 PM', stadium: 'Lumen Field, Seattle' },
            { home: 'Portugal', away: 'Croatia', date: 'Jul 2, 7:00 PM', stadium: 'BMO Field, Toronto' },
            { home: 'Spain', away: 'Austria', date: 'Jul 2, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { home: 'Switzerland', away: 'Algeria', date: 'Jul 2, 11:00 PM', stadium: 'BC Place, Vancouver' },
            { home: 'Argentina', away: 'Cape Verde', date: 'Jul 3, 6:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' },
            { home: 'Colombia', away: 'Ghana', date: 'Jul 3, 9:30 PM', stadium: 'Arrowhead Stadium, Kansas City' },
            { home: 'Australia', away: 'Egypt', date: 'Jul 3, 2:00 PM', stadium: 'AT&T Stadium, Arlington' }
        ];

        // ================================================================
        // 3. ROUND OF 16 – 8 matches (Match 89–96)
        // ================================================================
        const R16_SOURCES = [
            [0, 2], // 89: W73 vs W75
            [1, 4], // 90: W74 vs W77
            [3, 5], // 91: W76 vs W78
            [6, 7], // 92: W79 vs W80
            [10, 11], // 93: W83 vs W84
            [8, 9], // 94: W81 vs W82
            [13, 15], // 95: W86 vs W88
            [12, 14] // 96: W85 vs W87
        ];

        const R16_SCHEDULE = [
            { date: 'Jul 4, 1:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 4, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 5, 4:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { date: 'Jul 5, 8:00 PM', stadium: 'NRG Stadium, Houston' },
            { date: 'Jul 6, 3:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { date: 'Jul 6, 8:00 PM', stadium: 'Lumen Field, Seattle' },
            { date: 'Jul 7, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { date: 'Jul 7, 4:00 PM', stadium: 'Estadio Azteca, Mexico City' }
        ];

        // ================================================================
        // 4. QUARTER-FINALS – 4 matches (Match 97–100)
        // ================================================================
        const QF_SOURCES = [
            [0, 1], // 97: W89 vs W90
            [4, 5], // 98: W93 vs W94
            [2, 3], // 99: W91 vs W92
            [6, 7] // 100: W95 vs W96
        ];

        const QF_SCHEDULE = [
            { date: 'Jul 9, 4:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 10, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { date: 'Jul 11, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 11, 9:00 PM', stadium: 'NRG Stadium, Houston' }
        ];

        // ================================================================
        // 5. SEMI-FINALS – 2 matches (Match 101–102)
        // ================================================================
        const SF_SOURCES = [
            [0, 1], // 101: W97 vs W98
            [2, 3] // 102: W99 vs W100
        ];

        const SF_SCHEDULE = [
            { date: 'Jul 14, 3:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { date: 'Jul 15, 3:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' }
        ];

        // ================================================================
        // 6. THIRD PLACE & FINAL
        // ================================================================
        const THIRD_PLACE = { date: 'Jul 18, 5:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' };
        const FINAL = { date: 'Jul 19, 3:00 PM', stadium: 'MetLife Stadium, East Rutherford' };

        // ================================================================
        // 7. BUILD TOURNAMENT STATE
        // ================================================================
        let tournament = null;

        function buildTournament() {
            // rounds: 0=R32, 1=R16, 2=QF, 3=SF, 4=Third, 5=Final
            const rounds = [
                { name: 'Round of 32', matches: [] },
                { name: 'Round of 16', matches: [] },
                { name: 'Quarter-finals', matches: [] },
                { name: 'Semi-finals', matches: [] },
                { name: 'Third Place', matches: [] },
                { name: 'Final', matches: [] }
            ];

            // -- Round of 32 (16 matches) --
            for (let i = 0; i < 16; i++) {
                const d = R32_DATA[i];
                rounds[0].matches.push({
                    id: `r32_${i}`,
                    home: getTeam(d.home),
                    away: getTeam(d.away),
                    winner: null,
                    date: d.date,
                    stadium: d.stadium,
                    roundIdx: 0,
                    matchIdx: i
                });
            }

            // -- Round of 16 (8 matches) --
            for (let i = 0; i < 8; i++) {
                rounds[1].matches.push({
                    id: `r16_${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: R16_SCHEDULE[i].date,
                    stadium: R16_SCHEDULE[i].stadium,
                    roundIdx: 1,
                    matchIdx: i,
                    sources: R16_SOURCES[i]
                });
            }

            // -- Quarter-finals (4 matches) --
            for (let i = 0; i < 4; i++) {
                rounds[2].matches.push({
                    id: `qf_${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: QF_SCHEDULE[i].date,
                    stadium: QF_SCHEDULE[i].stadium,
                    roundIdx: 2,
                    matchIdx: i,
                    sources: QF_SOURCES[i]
                });
            }

            // -- Semi-finals (2 matches) --
            for (let i = 0; i < 2; i++) {
                rounds[3].matches.push({
                    id: `sf_${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: SF_SCHEDULE[i].date,
                    stadium: SF_SCHEDULE[i].stadium,
                    roundIdx: 3,
                    matchIdx: i,
                    sources: SF_SOURCES[i]
                });
            }

            // -- Third Place (1 match) --
            rounds[4].matches.push({
                id: 'third',
                home: null,
                away: null,
                winner: null,
                date: THIRD_PLACE.date,
                stadium: THIRD_PLACE.stadium,
                roundIdx: 4,
                matchIdx: 0,
                sources: null
            });

            // -- Final (1 match) --
            rounds[5].matches.push({
                id: 'final',
                home: null,
                away: null,
                winner: null,
                date: FINAL.date,
                stadium: FINAL.stadium,
                roundIdx: 5,
                matchIdx: 0,
                sources: null
            });

            return rounds;
        }

        // ================================================================
        // 8. RENDER
        // ================================================================
        function renderTournament() {
            const container = document.getElementById('tournament');
            container.innerHTML = '';

            tournament.forEach((round, rIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';

                const title = document.createElement('h2');
                title.textContent = round.name;
                roundDiv.appendChild(title);

                round.matches.forEach((match, mIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';

                    // Home
                    const homeDiv = document.createElement('div');
                    homeDiv.className = 'team home';
                    if (match.home) {
                        homeDiv.innerHTML = `${match.home.flag} ${match.home.name}`;
                        if (match.winner === match.home) homeDiv.classList.add('winner');
                        else if (match.winner) homeDiv.classList.add('loser');
                        if (!match.winner && match.home && match.away) {
                            homeDiv.style.cursor = 'pointer';
                            homeDiv.addEventListener('click', () => selectWinner(rIdx, mIdx, 'home'));
                        }
                    } else {
                        homeDiv.textContent = 'TBD';
                        homeDiv.classList.add('tbd');
                    }

                    // Away
                    const awayDiv = document.createElement('div');
                    awayDiv.className = 'team away';
                    if (match.away) {
                        awayDiv.innerHTML = `${match.away.flag} ${match.away.name}`;
                        if (match.winner === match.away) awayDiv.classList.add('winner');
                        else if (match.winner) awayDiv.classList.add('loser');
                        if (!match.winner && match.home && match.away) {
                            awayDiv.style.cursor = 'pointer';
                            awayDiv.addEventListener('click', () => selectWinner(rIdx, mIdx, 'away'));
                        }
                    } else {
                        awayDiv.textContent = 'TBD';
                        awayDiv.classList.add('tbd');
                    }

                    // Info
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'match-info';
                    infoDiv.textContent = `${match.date} | ${match.stadium}`;

                    matchDiv.appendChild(homeDiv);
                    matchDiv.appendChild(awayDiv);
                    matchDiv.appendChild(infoDiv);
                    roundDiv.appendChild(matchDiv);
                });

                container.appendChild(roundDiv);
            });
        }

        // ================================================================
        // 9. SELECT WINNER & PROPAGATE
        // ================================================================
        function selectWinner(roundIdx, matchIdx, side) {
            const match = tournament[roundIdx].matches[matchIdx];
            if (match.winner) return;

            const winner = side === 'home' ? match.home : match.away;
            if (!winner) return;

            match.winner = winner;

            // --- Propagate to next round ---
            if (roundIdx === 0) {
                // R32 -> R16
                const r16 = tournament[1];
                for (let i = 0; i < r16.matches.length; i++) {
                    const m = r16.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 1) {
                // R16 -> QF
                const qf = tournament[2];
                for (let i = 0; i < qf.matches.length; i++) {
                    const m = qf.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 2) {
                // QF -> SF
                const sf = tournament[3];
                for (let i = 0; i < sf.matches.length; i++) {
                    const m = sf.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 3) {
                // SF -> Final & Third Place
                const finalMatch = tournament[5].matches[0];
                const thirdMatch = tournament[4].matches[0];

                if (matchIdx === 0) {
                    finalMatch.home = winner;
                    const loser = side === 'home' ? match.away : match.home;
                    thirdMatch.home = loser;
                } else {
                    finalMatch.away = winner;
                    const loser = side === 'home' ? match.away : match.home;
                    thirdMatch.away = loser;
                }
            } else if (roundIdx === 4) {
                // Third Place finished
                setTimeout(() => {
                    alert(`🥉 Third Place: ${winner.flag} ${winner.name} 🥉`);
                }, 100);
            } else if (roundIdx === 5) {
                // Final finished
                setTimeout(() => {
                    alert(`🏆 Champion: ${winner.flag} ${winner.name} 🏆`);
                }, 100);
            }

            renderTournament();
        }

        // ================================================================
        // 10. RESET FUNCTION
        // ================================================================
        function resetTournament() {
            if (confirm('Are you sure you want to reset the entire bracket? All progress will be lost.')) {
                tournament = buildTournament();
                renderTournament();
            }
        }

        // ================================================================
        // 11. THEME TOGGLE
        // ================================================================
        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('light');
            this.textContent = document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
        });

        // ================================================================
        // 12. INIT & EVENT LISTENERS
        // ================================================================
        tournament = buildTournament();
        renderTournament();

        document.getElementById('reset-button').addEventListener('click', resetTournament);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
