<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>World Cup Knockout Simulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        /* ----- Reset & Base ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body.light {
            background: #f0f0f0;
            color: #222;
        }

        /* ----- Header & Footer ----- */
        header,
        footer {
            padding: 1rem;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        body.light header,
        body.light footer {
            background: #ddd;
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #theme-toggle {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #eee;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        body.light #theme-toggle {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
            color: #222;
        }
        #theme-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        body.light #theme-toggle:hover {
            background: rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: auto;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
        }
        footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        body.light footer a {
            color: #0277bd;
        }
        footer a:hover {
            text-decoration: underline;
        }

        /* ----- Tournament ----- */
        #tournament {
            display: flex;
            overflow-x: auto;
            padding: 1rem;
            gap: 1rem;
            flex: 1;
            align-items: flex-start;
        }
        .round {
            flex: 0 0 200px;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 0.6rem 0.4rem;
        }
        body.light .round {
            background: rgba(0, 0, 0, 0.04);
        }
        .round h2 {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 0 0.6rem 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .match {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 0.5rem 0.4rem;
            margin-bottom: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            transition: background 0.2s;
        }
        body.light .match {
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .team {
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            cursor: default;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        .team:not(.winner):not(.loser):hover {
            background: rgba(255, 255, 255, 0.15);
        }
        body.light .team:not(.winner):not(.loser):hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .team.winner {
            background: #ffd700;
            color: #000;
            font-weight: 700;
            border-radius: 4px;
            padding: 0.2rem 0.4rem;
        }
        .team.loser {
            opacity: 0.4;
            text-decoration: line-through;
        }
        .team.tbd {
            opacity: 0.5;
            font-style: italic;
        }
        .match-info {
            font-size: 0.6rem;
            text-align: center;
            opacity: 0.6;
            margin-top: 0.15rem;
            letter-spacing: 0.2px;
        }

        /* ----- Responsive tweaks ----- */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.1rem;
            }
            .round {
                flex: 0 0 170px;
                min-width: 170px;
            }
            .team {
                font-size: 0.75rem;
            }
            .match-info {
                font-size: 0.55rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ World Cup 2026</h1>
        <button id="theme-toggle">Light Mode</button>
    </header>

    <main id="tournament">
        <!-- Dynamically generated -->
    </main>

    <footer>
        <p>Contact us<br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
    </footer>

    <script>
        // --------------------------------------------------------------
        // 1. DATA – 32 qualified teams (based on actual Round of 32)
        // --------------------------------------------------------------
        const TEAMS = [
            // Group A
            { name: 'Mexico', flag: '🇲🇽' },
            { name: 'South Africa', flag: '🇿🇦' },
            // Group B
            { name: 'Switzerland', flag: '🇨🇭' },
            { name: 'Canada', flag: '🇨🇦' },
            { name: 'Bosnia and Herzegovina', flag: '🇧🇦' },
            // Group C
            { name: 'Brazil', flag: '🇧🇷' },
            { name: 'Morocco', flag: '🇲🇦' },
            // Group D
            { name: 'United States', flag: '🇺🇸' },
            { name: 'Australia', flag: '🇦🇺' },
            { name: 'Paraguay', flag: '🇵🇾' },
            // Group E
            { name: 'Germany', flag: '🇩🇪' },
            { name: 'Ivory Coast', flag: '🇨🇮' },
            { name: 'Ecuador', flag: '🇪🇨' },
            // Group F
            { name: 'Netherlands', flag: '🇳🇱' },
            { name: 'Japan', flag: '🇯🇵' },
            { name: 'Sweden', flag: '🇸🇪' },
            // Group G
            { name: 'Belgium', flag: '🇧🇪' },
            { name: 'Egypt', flag: '🇪🇬' },
            // Group H
            { name: 'Spain', flag: '🇪🇸' },
            { name: 'Cape Verde', flag: '🇨🇻' },
            // Group I
            { name: 'France', flag: '🇫🇷' },
            { name: 'Norway', flag: '🇳🇴' },
            { name: 'Senegal', flag: '🇸🇳' },
            // Group J
            { name: 'Argentina', flag: '🇦🇷' },
            { name: 'Austria', flag: '🇦🇹' },
            { name: 'Algeria', flag: '🇩🇿' },
            // Group K
            { name: 'Colombia', flag: '🇨🇴' },
            { name: 'Portugal', flag: '🇵🇹' },
            { name: 'DR Congo', flag: '🇨🇩' },
            // Group L
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
            { name: 'Croatia', flag: '🇭🇷' },
            { name: 'Ghana', flag: '🇬🇭' }
        ];

        // --------------------------------------------------------------
        // 2. ROUND OF 32 MATCHUPS (actual pairings)
        // --------------------------------------------------------------
        const R32_MATCHUPS = [
            { home: 'South Africa', away: 'Canada' },
            { home: 'Brazil', away: 'Japan' },
            { home: 'Germany', away: 'Paraguay' },
            { home: 'Netherlands', away: 'Morocco' },
            { home: 'Ivory Coast', away: 'Norway' },
            { home: 'France', away: 'Sweden' },
            { home: 'Mexico', away: 'Ecuador' },
            { home: 'England', away: 'DR Congo' },
            { home: 'Belgium', away: 'Senegal' },
            { home: 'United States', away: 'Bosnia and Herzegovina' },
            { home: 'Spain', away: 'Austria' },
            { home: 'Portugal', away: 'Croatia' },
            { home: 'Switzerland', away: 'Algeria' },
            { home: 'Australia', away: 'Egypt' },
            { home: 'Argentina', away: 'Cape Verde' },
            { home: 'Colombia', away: 'Ghana' }
        ];

        // --------------------------------------------------------------
        // 3. STADIUMS & SCHEDULE (actual venues and dates)
        // --------------------------------------------------------------
        const R32_SCHEDULE = [
            { date: 'Jun 28, 3:00 PM', stadium: 'SoFi Stadium, Inglewood' },
            { date: 'Jun 29, 1:00 PM', stadium: 'NRG Stadium, Houston' },
            { date: 'Jun 29, 4:30 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jun 29, 9:00 PM', stadium: 'Estadio BBVA, Guadalupe' },
            { date: 'Jun 30, 1:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { date: 'Jun 30, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jun 30, 9:00 PM', stadium: 'Estadio Azteca, Mexico City' },
            { date: 'Jul 1, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { date: 'Jul 1, 4:00 PM', stadium: 'Lumen Field, Seattle' },
            { date: 'Jul 1, 8:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { date: 'Jul 2, 3:00 PM', stadium: 'SoFi Stadium, Inglewood' },
            { date: 'Jul 2, 7:00 PM', stadium: 'BMO Field, Toronto' },
            { date: 'Jul 2, 11:00 PM', stadium: 'BC Place, Vancouver' },
            { date: 'Jul 3, 2:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { date: 'Jul 3, 6:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' },
            { date: 'Jul 3, 9:30 PM', stadium: 'Arrowhead Stadium, Kansas City' }
        ];

        // Round of 16 schedule (index matches R32 winner pairs)
        const R16_SCHEDULE = [
            { date: 'Jul 4, 1:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 4, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 5, 4:00 PM', stadium: 'SoFi Stadium, Inglewood' },
            { date: 'Jul 5, 8:00 PM', stadium: 'NRG Stadium, Houston' },
            { date: 'Jul 6, 3:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { date: 'Jul 6, 8:00 PM', stadium: 'Lumen Field, Seattle' },
            { date: 'Jul 7, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { date: 'Jul 7, 4:00 PM', stadium: 'Estadio Azteca, Mexico City' }
        ];

        // Quarter-finals schedule
        const QF_SCHEDULE = [
            { date: 'Jul 9, 4:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 10, 3:00 PM', stadium: 'SoFi Stadium, Inglewood' },
            { date: 'Jul 11, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 11, 9:00 PM', stadium: 'NRG Stadium, Houston' }
        ];

        // Semi-finals schedule
        const SF_SCHEDULE = [
            { date: 'Jul 14, 3:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { date: 'Jul 15, 3:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' }
        ];

        // Third place & Final
        const THIRD_PLACE = { date: 'Jul 18, 5:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' };
        const FINAL = { date: 'Jul 19, 3:00 PM', stadium: 'MetLife Stadium, East Rutherford' };

        // Helper: get team object by name
        function getTeamByName(name) {
            return TEAMS.find(t => t.name === name);
        }

        // --------------------------------------------------------------
        // 4. TOURNAMENT STATE
        // --------------------------------------------------------------
        let tournament = null;

        function initTournament() {
            const rounds = [
                { name: 'Round of 32', matches: [] },
                { name: 'Round of 16', matches: [] },
                { name: 'Quarter-finals', matches: [] },
                { name: 'Semi-finals', matches: [] },
                { name: 'Third Place', matches: [] },
                { name: 'Final', matches: [] }
            ];

            // Round 1: Round of 32 (16 matches)
            for (let i = 0; i < 16; i++) {
                const home = getTeamByName(R32_MATCHUPS[i].home);
                const away = getTeamByName(R32_MATCHUPS[i].away);
                rounds[0].matches.push({
                    id: `r1m${i}`,
                    home: home,
                    away: away,
                    winner: null,
                    date: R32_SCHEDULE[i].date,
                    stadium: R32_SCHEDULE[i].stadium,
                    roundIdx: 0,
                    matchIdx: i
                });
            }

            // Round 2: Round of 16 (8 matches)
            for (let i = 0; i < 8; i++) {
                rounds[1].matches.push({
                    id: `r2m${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: R16_SCHEDULE[i].date,
                    stadium: R16_SCHEDULE[i].stadium,
                    roundIdx: 1,
                    matchIdx: i
                });
            }

            // Round 3: Quarter-finals (4 matches)
            for (let i = 0; i < 4; i++) {
                rounds[2].matches.push({
                    id: `r3m${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: QF_SCHEDULE[i].date,
                    stadium: QF_SCHEDULE[i].stadium,
                    roundIdx: 2,
                    matchIdx: i
                });
            }

            // Round 4: Semi-finals (2 matches)
            for (let i = 0; i < 2; i++) {
                rounds[3].matches.push({
                    id: `r4m${i}`,
                    home: null,
                    away: null,
                    winner: null,
                    date: SF_SCHEDULE[i].date,
                    stadium: SF_SCHEDULE[i].stadium,
                    roundIdx: 3,
                    matchIdx: i
                });
            }

            // Round 5: Third Place (1 match)
            rounds[4].matches.push({
                id: 'r5m0',
                home: null,
                away: null,
                winner: null,
                date: THIRD_PLACE.date,
                stadium: THIRD_PLACE.stadium,
                roundIdx: 4,
                matchIdx: 0
            });

            // Round 6: Final (1 match)
            rounds[5].matches.push({
                id: 'r6m0',
                home: null,
                away: null,
                winner: null,
                date: FINAL.date,
                stadium: FINAL.stadium,
                roundIdx: 5,
                matchIdx: 0
            });

            return rounds;
        }

        // --------------------------------------------------------------
        // 5. RENDER
        // --------------------------------------------------------------
        function renderTournament() {
            const container = document.getElementById('tournament');
            container.innerHTML = '';

            tournament.forEach((round, rIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';

                const title = document.createElement('h2');
                title.textContent = round.name;
                roundDiv.appendChild(title);

                round.matches.forEach((match, mIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';

                    // Home team
                    const homeDiv = document.createElement('div');
                    homeDiv.className = 'team home';
                    if (match.home) {
                        homeDiv.innerHTML = `${match.home.flag} ${match.home.name}`;
                        if (match.winner === match.home) {
                            homeDiv.classList.add('winner');
                        } else if (match.winner) {
                            homeDiv.classList.add('loser');
                        }
                        if (!match.winner && match.home && match.away) {
                            homeDiv.style.cursor = 'pointer';
                            homeDiv.addEventListener('click', () => selectWinner(rIdx, mIdx, 'home'));
                        }
                    } else {
                        homeDiv.textContent = 'TBD';
                        homeDiv.classList.add('tbd');
                    }

                    // Away team
                    const awayDiv = document.createElement('div');
                    awayDiv.className = 'team away';
                    if (match.away) {
                        awayDiv.innerHTML = `${match.away.flag} ${match.away.name}`;
                        if (match.winner === match.away) {
                            awayDiv.classList.add('winner');
                        } else if (match.winner) {
                            awayDiv.classList.add('loser');
                        }
                        if (!match.winner && match.home && match.away) {
                            awayDiv.style.cursor = 'pointer';
                            awayDiv.addEventListener('click', () => selectWinner(rIdx, mIdx, 'away'));
                        }
                    } else {
                        awayDiv.textContent = 'TBD';
                        awayDiv.classList.add('tbd');
                    }

                    // Match info (date & stadium)
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'match-info';
                    infoDiv.textContent = `${match.date} | ${match.stadium}`;

                    matchDiv.appendChild(homeDiv);
                    matchDiv.appendChild(awayDiv);
                    matchDiv.appendChild(infoDiv);
                    roundDiv.appendChild(matchDiv);
                });

                container.appendChild(roundDiv);
            });
        }

        // --------------------------------------------------------------
        // 6. SELECT WINNER
        // --------------------------------------------------------------
        function selectWinner(roundIdx, matchIdx, side) {
            const match = tournament[roundIdx].matches[matchIdx];
            if (match.winner) return;

            const winner = side === 'home' ? match.home : match.away;
            if (!winner) return;

            match.winner = winner;

            // Propagate to next round
            if (roundIdx === 0) {
                // Round of 32 -> Round of 16
                const nextRound = tournament[1];
                const nextMatchIdx = Math.floor(matchIdx / 2);
                const nextMatch = nextRound.matches[nextMatchIdx];
                if (matchIdx % 2 === 0) {
                    nextMatch.home = winner;
                } else {
                    nextMatch.away = winner;
                }
            } else if (roundIdx === 1) {
                // Round of 16 -> Quarter-finals
                const nextRound = tournament[2];
                const nextMatchIdx = Math.floor(matchIdx / 2);
                const nextMatch = nextRound.matches[nextMatchIdx];
                if (matchIdx % 2 === 0) {
                    nextMatch.home = winner;
                } else {
                    nextMatch.away = winner;
                }
            } else if (roundIdx === 2) {
                // Quarter-finals -> Semi-finals
                const nextRound = tournament[3];
                const nextMatchIdx = Math.floor(matchIdx / 2);
                const nextMatch = nextRound.matches[nextMatchIdx];
                if (matchIdx % 2 === 0) {
                    nextMatch.home = winner;
                } else {
                    nextMatch.away = winner;
                }
            } else if (roundIdx === 3) {
                // Semi-finals -> Final & Third Place
                // Winner goes to Final
                const finalMatch = tournament[5].matches[0];
                if (matchIdx === 0) {
                    finalMatch.home = winner;
                } else {
                    finalMatch.away = winner;
                }
                // Loser goes to Third Place
                const loser = side === 'home' ? match.away : match.home;
                const thirdPlaceMatch = tournament[4].matches[0];
                if (matchIdx === 0) {
                    thirdPlaceMatch.home = loser;
                } else {
                    thirdPlaceMatch.away = loser;
                }
            } else if (roundIdx === 4) {
                // Third Place finished
                setTimeout(() => {
                    alert(`🥉 Third Place: ${winner.flag} ${winner.name} 🥉`);
                }, 100);
            } else if (roundIdx === 5) {
                // Final finished – show champion
                setTimeout(() => {
                    alert(`🏆 Champion: ${winner.flag} ${winner.name} 🏆`);
                }, 100);
            }

            renderTournament();
        }

        // --------------------------------------------------------------
        // 7. THEME TOGGLE
        // --------------------------------------------------------------
        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('light');
            this.textContent = document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
        });

        // --------------------------------------------------------------
        // 8. INIT & SERVICE WORKER REGISTRATION
        // --------------------------------------------------------------
        tournament = initTournament();
        renderTournament();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
